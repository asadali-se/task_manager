[phases.setup]
nixPkgs = ["python313", "python313Packages.pip"]

[phases.install]
cmds = ["python3 -m pip install --upgrade pip && cd server && pip install -r requirements.txt"]

[phases.build]
cmds = ["cd server && python manage.py collectstatic --noinput"]

[start]
cmd = "cd server && gunicorn taskmanager.wsgi:application --bind 0.0.0.0:$PORT"

[static]
guest = "/app/server/staticfiles"
