[build]
builder = "nixpacks"

[deploy]
startCommand = "gunicorn taskmanager.wsgi:application --bind 0.0.0.0:$PORT"
healthcheckPath = "/api/tasks/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"

# Enable public networking
[[services]]
name = "web"
protocol = "TCP"
	port = 80
	[[services.port]]
		port = 80
		target_port = 8000
		[[services.port.public]]
			protocol = "HTTPS"
			policies = ["load_balanced"]
