services:
  # Django Web Service
  - type: web
    name: task-manager-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn taskmanager.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: task-manager-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: .onrender.com,.vercel.app,localhost
      - key: FRONTEND_URL
        value: https://task-manager-green-two.vercel.app

  # PostgreSQL Database (if you want to use Render's database instead of Neon)
  # - type: postgres
  #   name: task-manager-db
  #   databaseName: task_manager
  #   user: task_manager_user
