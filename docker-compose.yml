version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: taskmanager_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: taskmanager_db
      POSTGRES_USER: asad
      POSTGRES_PASSWORD: 490530
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asad -d taskmanager_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
